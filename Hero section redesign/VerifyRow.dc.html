<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  a { color: #B08D3E; text-decoration: none; }
  a:hover { color: #D8B15A; }
</style>
</helmet>
<div style="background:#0C1F2B; color:#F7F5F1; font-family:'Archivo',system-ui,sans-serif;">
  <div style="max-width:1152px; margin:0 auto; padding:0 20px 40px;">
    <div style="border-top:1px solid #2A4254; padding-top:28px; display:flex; flex-direction:column; gap:16px;">
      <div style="display:flex; flex-wrap:wrap; align-items:baseline; gap:8px 18px;">
        <h2 style="margin:0; font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.16em; color:#B08D3E;">Verify his record</h2>
        <p style="margin:0; font-size:0.8rem; color:rgba(247,245,241,0.5);">Independent registers, profiles and reviews. All links live in links.json.</p>
      </div>
      <div style="display:flex; flex-wrap:wrap; gap:10px;">
        <sc-for list="{{ items }}" as="p" hint-placeholder-count="8">
          <a href="{{ p.href }}" target="{{ p.target }}" rel="noopener" style="{{ p.style }}">
            <span style="font-weight:600; font-size:0.85rem; color:#F7F5F1;">{{ p.label }}</span>
            <span style="font-size:0.75rem; color:rgba(247,245,241,0.55);">{{ p.sublabel }}</span>
            <span style="{{ p.badgeStyle }}">{{ p.badge }}</span>
          </a>
        </sc-for>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1200, &quot;height&quot;: 260}}">
class Component extends DCLogic {
  state = { profiles: [] };
  componentDidMount() {
    fetch('links.json')
      .then(r => r.json())
      .then(d => this.setState({ profiles: d.profiles || [] }))
      .catch(() => {});
  }
  renderVals() {
    const base = 'display:inline-flex; align-items:center; gap:8px; border-radius:999px; padding:8px 15px; transition:border-color .2s;';
    const items = this.state.profiles.map(p => {
      const set = !!p.url;
      return {
        label: p.label,
        sublabel: p.sublabel || '',
        href: set ? p.url : undefined,
        target: set ? '_blank' : undefined,
        style: set
          ? base + 'border:1px solid #2A4254; background:rgba(247,245,241,0.04); cursor:pointer;'
          : base + 'border:1px dashed #6E5826; background:transparent; cursor:default;',
        badge: set ? '\u2197' : 'add link',
        badgeStyle: set
          ? 'font-size:0.85rem; color:#B08D3E;'
          : 'font-family:ui-monospace,Menlo,Consolas,monospace; font-size:0.6rem; letter-spacing:0.08em; text-transform:uppercase; color:#D8B15A; border:1px dashed #6E5826; border-radius:4px; padding:1px 6px;'
      };
    });
    return { items };
  }
}
</script>
</body>
</html>
